<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Neural Network Visualization</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link href="./style.css" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>

<style>

body{

    margin:0;
    padding:0;

    background:#0f0f0f;

    color:white;

    font-family:Arial,sans-serif;

    overflow:hidden;
}

.title{

    text-align:center;

    margin-top:20px;

    font-size:2rem;

    font-weight:600;
}

.subtitle{

    text-align:center;

    color:#aaa;

    margin-bottom:20px;
}

.main-layout{

    display:flex;

    justify-content:center;

    align-items:flex-start;

    gap:30px;

    padding:20px;

    flex-wrap:wrap;
}

.panel{

    background:#171717;

    border:1px solid #2a2a2a;

    border-radius:14px;

    padding:15px;

    box-shadow:
    0 0 25px rgba(0,255,120,0.08);
}

.canvas-panel{

    display:flex;

    flex-direction:column;

    align-items:center;
}

canvas{

    border-radius:10px;
}

#can{

    border:2px solid #333;

    cursor:crosshair;

    background:#ffffff;
}

#input_layer_canvas{

    background:#000000;
}

.label{

    margin-top:12px;

    text-align:center;

    color:#aaa;

    font-size:0.95rem;
}

.controls{

    margin-top:15px;

    display:flex;

    gap:10px;
}

button{

    border:none;

    padding:10px 20px;

    border-radius:8px;

    background:#222;

    color:white;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    background:#333;
}

.output-box{

    width:180px;

    height:180px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:6rem;

    font-weight:bold;

    border-radius:12px;

    border:2px solid #333;

    background:#101010;
}

.credit{

    position:fixed;

    bottom:10px;

    right:20px;

    color:#666;

    font-size:0.8rem;
}

</style>

</head>

<body>

<h1 class="title">
Interactive Neural Network Visualization
</h1>

<p class="subtitle">
Handwritten Digit Recognition using MNIST
</p>

<div class="main-layout">

    <div class="panel canvas-panel">

        <canvas id="can"
        width="280"
        height="280"></canvas>

        <div class="controls">

            <button id="clr"
            onclick="erase()">

                Clear

            </button>

            <button id="recognize"
            onclick="recognize()">

                Recognize

            </button>

        </div>

        <p class="label">
            Draw a digit
        </p>

    </div>

    <div class="panel">

        <canvas id="input_layer_canvas"
        width="280"
        height="280"></canvas>

        <p class="label">
            Preprocessed Input (28×28)
        </p>

    </div>

    <div class="panel">

        <div id="layer2"
        style="
        width:280px;
        height:280px;
        ">
        </div>

        <p class="label">
            Hidden Layer Activations
        </p>

    </div>

    <div class="panel">

        <div id="layer3"
        class="output_graph">
        </div>

         <div class="scale_div">
                <div class="vertical-numbers">9<br>8<br>7<br>6<br>5<br>4<br>3<br>2<br>1<br>0</div>
            </div>

        <p class="label">
            Output Probabilities
        </p>

    </div>

    <div class="panel">

        <div id="nnOut"
        class="output-box">
        </div>

        <p class="label">
            Predicted Digit
        </p>

    </div>

</div>

<div class="credit">

    Based on the original project by
    :contentReference[oaicite:0]{index=0}

</div>

<script src="./classify.js"></script>

</body>

</html>
